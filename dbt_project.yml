name: "pipeforge"
version: "0.1.0"
config-version: 2

# This profile must exist in ~/.dbt/profiles.yml (see profiles.yml.example).
profile: "pipeforge"

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Layer -> BigQuery dataset mapping. The dataset name is taken verbatim via the
# generate_schema_name macro (see macros/generate_schema_name.sql), so models land
# in `staging`, `intermediate`, `marts` rather than dbt's default <target>_<schema>.
#
# Materializations (ADR 0008 keeps SQL portable):
#   staging      -> view  (cheap, always-fresh adaptation of raw)
#   intermediate -> view  (joins / reusable calculations)
#   marts        -> table (final deliverables, queried often)
models:
  pipeforge:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
